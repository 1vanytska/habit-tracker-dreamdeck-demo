<div class="home-container">
    <div class="search-add">
        
        <div class="search-wrapper">
            <button class="search-icon-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#147ba0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
            <input type="text" placeholder="Пошук" class="search-input" />
        </div>

        <button class="btn add-btn" routerLink="/create-goal">+</button>
    </div>

    <div class="cards-grid">
        
        @for (goal of goals; track goal.goalId) {
            <div class="card" 
                 [routerLink]="['/goal', goal.goalId]" 
                 [class.archived-card]="goal.isArchived"
                 style="cursor: pointer;">
                
                <div class="card-img-wrapper">
                    <img [src]="getGoalImage(goal)" [alt]="goal.title" class="card-img" />
                </div>

                <div class="card-title">{{ goal.title }}</div>
            </div>
        } @empty {
            <div style="grid-column: 1/-1; text-align: center; color: #147ba0;">
                <p>У вас поки немає цілей. Створіть першу! 🚀</p>
            </div>
        }

    </div>
</div>
