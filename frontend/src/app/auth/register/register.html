<div class="auth-container page-animate">
  <div class="auth-card">
    <h2 class="auth-title">Створити акаунт 🚀</h2>
    <p class="auth-subtitle">Почніть свій шлях до мрій вже сьогодні</p>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="username">Ім'я користувача (@username)</label>
        <input type="text" id="username" [(ngModel)]="registerData.username" name="username" placeholder="sofiia_dev" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" [(ngModel)]="registerData.email" name="email" placeholder="sofiia@example.com" required>
      </div>

      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" [(ngModel)]="registerData.password" name="password" placeholder="••••••••" required>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary auth-btn" [disabled]="isLoading">
          {{ isLoading ? 'Реєстрація...' : 'Зареєструватися' }}
        </button>
      </div>
    </form>

    <p class="auth-footer">
      Вже є акаунт? <a routerLink="/login">Увійти</a>
    </p>
  </div>
</div>
