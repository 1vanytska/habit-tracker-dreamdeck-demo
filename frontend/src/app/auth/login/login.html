<div class="auth-container page-animate">
  <div class="auth-card">
    <h2 class="auth-title">З поверненням! 👋</h2>
    <p class="auth-subtitle">Увійдіть, щоб продовжити досягати цілей</p>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" [(ngModel)]="loginData.email" name="email" placeholder="vasyl@example.com" required>
      </div>

      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" [(ngModel)]="loginData.password" name="password" placeholder="••••••••" required>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary auth-btn" [disabled]="isLoading">
          {{ isLoading ? 'Вхід...' : 'Увійти' }}
        </button>
      </div>
    </form>

    <p class="auth-footer">
      Ще не маєте акаунту? <a routerLink="/register">Зареєструватися</a>
    </p>
  </div>
</div>
