<div class="auth-container page-animate">
  <div class="auth-card">
    <h2 class="auth-title">Увійти</h2>
    <p class="auth-subtitle">Продовжуйте свій шлях вже сьогодні</p>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="loginInput">Логін</label>
        <input type="text" id="loginInput" [(ngModel)]="loginData.login" name="login" placeholder="Введіть логін" required>
      </div>

      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" [(ngModel)]="loginData.password" name="password" placeholder="••••••••" required>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary auth-btn" [disabled]="isLoading">
          {{ isLoading ? 'Вхід...' : 'Увійти' }}
        </button>
      </div>
    </form>

    <p class="auth-footer">
      Ще не маєте акаунту? <a routerLink="/register">Зареєструватися</a>
    </p>
  </div>
</div>
