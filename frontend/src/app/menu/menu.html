<div class="menu-wrapper">
  <div class="profile-section">
    <div class="user-info">
      <img [src]="userProfile?.profilePicture || defaultAvatar" alt="Користувач"
        class="avatar clickable-avatar" [routerLink]="['/edit-profile']" title="Редагувати профіль" />
      <span class="nickname">{{ userProfile?.username || 'Завантаження...' }}</span>
      <span class="user-description">{{ userProfile?.description || 'Додайте опис у профілі' }}</span>
    </div>
    <hr class="divider profile-divider" />
  </div>

  <nav class="menu-panel" [class.is-open]="menuOpen">
    <button
      type="button"
      class="menu-toggle"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen"
      aria-controls="menu-body"
    >
      Меню
      <span class="menu-chevron" aria-hidden="true"></span>
    </button>

    <div id="menu-body" class="menu-body">
      <ul class="menu-list">
        <li><a routerLink="/home" (click)="closeMenu()">Мої цілі</a></li>
        <li><a routerLink="/categories/new" (click)="closeMenu()">Створити категорію</a></li>
        <li><a routerLink="/achievement-plan" (click)="closeMenu()">План досягнень</a></li>
        <li><a routerLink="/coming-soon" (click)="closeMenu()">Мотиваційна дошка</a></li>
        <li><a routerLink="/coming-soon" (click)="closeMenu()">Нагадування</a></li>
        <li><a routerLink="/coming-soon" (click)="closeMenu()">Мої нагороди</a></li>
        <li><a routerLink="/coming-soon" (click)="closeMenu()">Оцінка прогресу</a></li>
        <li><a routerLink="/coming-soon" (click)="closeMenu()">Мій настрій</a></li>
      </ul>
    </div>
  </nav>
</div>
